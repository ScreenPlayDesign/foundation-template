name: Update Playwright baselines

# Trigger manually from the GitHub Actions UI when you intentionally change
# the UI and need to re-stamp the Linux screenshot baselines.
#
# Usage:
#   Actions → "Update Playwright baselines" → Run workflow → pick branch
#   Optionally supply a spec filename (e.g. "landing.spec.ts") to update
#   only that file's baselines instead of all of them.
on:
  workflow_dispatch:
    inputs:
      spec:
        description: 'Spec file to update (blank = all specs)'
        required: false
        default: ''

concurrency:
  group: update-baselines-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: Generate Linux baselines + auto-commit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write   # needed to push the baseline commit back

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright (chromium)
        run: bunx playwright install --with-deps chromium

      - name: Generate baselines
        run: |
          if [ -n "${{ inputs.spec }}" ]; then
            bunx playwright test tests/specs/${{ inputs.spec }} --update-snapshots
          else
            bun run test --update-snapshots
          fi
        env:
          VITE_SUPABASE_URL:      ${{ vars.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || 'placeholder_anon_key' }}

      - name: Commit updated baselines
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'test: update linux playwright baselines [skip ci]'
          file_pattern: 'tests/specs/**/*-snapshots/*.png'
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
