# ci.yml — SPD pipeline: typecheck + Gherkin-backed Playwright on every push
# to a pipeline branch. Results flow back to the dashboard via the serverless
# `github-webhook` Supabase edge function → project_branches.ci_status.
name: ci
on:
  push:
    branches: [dev, staging, prod]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck
      - run: bunx playwright install --with-deps chromium
      - run: bun run test
        env:
          VITE_SUPABASE_URL:      ${{ vars.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || 'placeholder_anon_key' }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
