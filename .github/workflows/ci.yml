# ci.yml — SPD pipeline: typecheck + Gherkin-backed Playwright on every push
# to a pipeline branch. Results flow back to the ScreenPlayDesign dashboard
# via the cli-api edge function → test_runs + test_scenarios tables.
name: ci

on:
  push:
    branches: [dev, staging, prod]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: TypeScript check
        run: bun run typecheck

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: playwright
        run: bun run test
        continue-on-error: true   # capture result even on failure
        env:
          BASE_URL:               ${{ vars.STAGING_URL || '' }}
          VITE_SUPABASE_URL:      ${{ vars.VITE_SUPABASE_URL      || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || 'placeholder_anon_key' }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: review-${{ github.ref_name }}-${{ github.run_number }}
          path: review/
          retention-days: 30

      - name: Post results to SPD dashboard
        if: always() && vars.SPD_API_URL != ''
        env:
          SPD_API_TOKEN:    ${{ secrets.SPD_API_TOKEN }}
          SPD_API_URL:      ${{ vars.SPD_API_URL }}
          SPD_PROJECT_SLUG: ${{ vars.SPD_PROJECT_SLUG }}
          BRANCH:           ${{ github.ref_name }}
          GITHUB_RUN_ID:    ${{ github.run_id }}
          GITHUB_RUN_URL:   ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PLAYWRIGHT_EXIT:  ${{ steps.playwright.outcome }}
        run: |
          if [ -f "scripts/post-spd-results.ts" ]; then
            bun run scripts/post-spd-results.ts || echo "⚠  SPD result post failed (non-fatal)"
          else
            echo "scripts/post-spd-results.ts not found — skipping SPD report"
          fi

      - name: Fail job if tests failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1
