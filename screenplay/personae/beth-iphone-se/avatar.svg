<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <title>Beth — captain energy, negotiates everything, never loses an argument</title>
  <circle cx="48" cy="48" r="48" fill="#4c1d1d"/>
  <circle cx="48" cy="48" r="48" fill="url(#beth-grad)" fill-opacity="0.35"/>
  <defs>
    <linearGradient id="beth-grad" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#4c1d1d" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- head -->
  <circle cx="48" cy="42" r="17" fill="#d99a72"/>
  <!-- wind-blown hair with a streak of grey — "middle-aged captain" -->
  <path d="M29 40c-2-13 7-24 19-24s21 11 19 24c-4-8-11-11-19-11s-15 3-19 11z" fill="#5b3a29"/>
  <path d="M40 21c3-2 7-3 8-3" stroke="#c9c9c9" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- eyepatch: the pirate signature -->
  <path d="M33 40l30-2" stroke="#1c1c1c" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="40" cy="41" rx="5" ry="6" fill="#1c1c1c"/>
  <circle cx="56" cy="41" r="2" fill="#1c1c1c"/>
  <!-- bandana -->
  <path d="M30 32c4-8 12-13 18-13s14 5 18 13c-6-3-12-5-18-5s-12 2-18 5z" fill="#7f1d1d"/>
  <path d="M62 26l8 6-3 1z" fill="#7f1d1d"/>
  <!-- shoulders / captain's coat -->
  <path d="M18 88c2-17 14-28 30-28s28 11 30 28z" fill="#5c2323"/>
  <!-- gold button trim -->
  <circle cx="48" cy="68" r="2" fill="#f59e0b"/>
  <circle cx="48" cy="76" r="2" fill="#f59e0b"/>
  <!-- small hoop earring -->
  <circle cx="63" cy="46" r="2" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
</svg>
