# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — SPD project dev stack
# Generated by `spd init <name>`. Owned by the project, not the platform.
#
# ── Three-database model ─────────────────────────────────────────────────────
#
#   local    →  Supabase stack launched from this file (supabase CLI docker)
#   staging  →  <staging-ref>.supabase.co  (cloud; for dress rehearsal reviews)
#   prod     →  <prod-ref>.supabase.co     (CI-only; never run locally)
#
#   The default target is ALWAYS local — staging and prod DBs are never
#   touched from a running local container. You promote via `spd gate advance`.
#
# ── Profiles ─────────────────────────────────────────────────────────────────
#
#   (no profile)  →  nothing (use host shim: spd <command>)
#   --profile dev →  Supabase local stack + Vite HMR dev server
#   --profile pw  →  all of the above + Playwright runner
#
# ── Usage ────────────────────────────────────────────────────────────────────
#
#   spd dev                              # same as the line below (via spd dev command)
#   docker compose --profile dev up      # Supabase + Vite dev server
#   docker compose --profile pw run playwright   # run scenes against local stack
#   docker compose --profile dev down    # tear down (Supabase data persists in volumes)
#   docker compose --profile dev down -v # tear down + wipe local DB (fresh slate)
#
# ─────────────────────────────────────────────────────────────────────────────

# ── Include Supabase local stack ──────────────────────────────────────────────
# Supabase CLI generates supabase/docker/docker-compose.yml after `supabase init`.
# Including it here means `docker compose --profile dev up` starts:
#   - postgres, postgrest, gotrue (auth), realtime, storage, studio, kong
# all in one command. No separate `supabase start` needed.
include:
  - path: ./supabase/docker/docker-compose.yml
    env_file:
      - ./supabase/docker/.env
    project_directory: ./supabase/docker

networks:
  # Supabase's compose stack creates this network. We declare it external so
  # our app and Playwright containers can reach Supabase services by name.
  # Name format: supabase_network_<project-slug>
  supabase_network:
    external: true
    name: "supabase_network_${COMPOSE_PROJECT_NAME:-spd-project}"

# ── Fixed local Supabase credentials ─────────────────────────────────────────
# These are the same for EVERY local Supabase instance — not secrets.
# Inside Docker: http://supabase-kong:8000 is the local Supabase API gateway.
# From the host browser: http://localhost:54321
x-local-supabase: &local-supabase
  VITE_SUPABASE_URL:      "${VITE_SUPABASE_URL:-http://supabase-kong:8000}"
  VITE_SUPABASE_ANON_KEY: "${VITE_SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7kyqd7B8LzSPCLMoW4raUmzqEsHV_oTxKpo}"

x-host-gateway: &host-gateway
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:

  # ── App dev server ────────────────────────────────────────────────────────
  # Vite HMR. Source is bind-mounted so edits on host reflect instantly.
  # Joins the Supabase network to reach supabase-kong by name.
  app:
    build:
      context:    .
      dockerfile: Dockerfile
      target:     dev
    container_name: "${COMPOSE_PROJECT_NAME:-spd-project}-app"
    volumes:
      - .:/app
      - /app/node_modules   # prevents host node_modules from shadowing
    ports:
      - "${APP_PORT:-5173}:5173"
    environment:
      <<: *local-supabase
      NODE_ENV: development
    networks:
      - default
      - supabase_network
    <<: *host-gateway
    profiles: ["dev", "pw"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # ── Playwright scene runner ───────────────────────────────────────────────
  # Profile: pw — run with: docker compose --profile pw run playwright
  # Microsoft's image has all three browsers pre-installed.
  # Connects to the app container and to local Supabase for data assertions.
  playwright:
    image: mcr.microsoft.com/playwright:v1.49.0-jammy
    container_name: "${COMPOSE_PROJECT_NAME:-spd-project}-playwright"
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      <<: *local-supabase
      BASE_URL: "http://app:5173"
      CI: "true"
    networks:
      - default
      - supabase_network
    <<: *host-gateway
    depends_on:
      app:
        condition: service_healthy
    profiles: ["pw"]
    command:
      - npx
      - playwright
      - test
      - "--reporter=html,json"
