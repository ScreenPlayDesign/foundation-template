# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Playwright-only fixture stack. NOT the dev workflow.
#
# For actual development, use `spd dev` (or `make dev`, which just calls it) —
# it runs inside the project's own spd-managed container (Dockerfile.project),
# with agency credentials baked in, orchestrated by spd-admin. That's the one
# real way this project runs in Docker day to day.
#
# This file exists for exactly one thing: giving Playwright something to test
# against (`app`) without needing SPD platform/agency credentials at all —
# useful for CI runners or anyone who wants to run the Playwright suite without
# going through spd-admin. `app` here builds from the plain `Dockerfile`
# (credential-free, generic bun+vite build), deliberately NOT Dockerfile.project.
# It used to also be reachable as a second "dev mode" via `--profile dev` —
# that's gone now: it bypassed spd's container-only enforcement
# (scripts/require-container.ts) entirely, since docker-compose never told it
# it was inside a container, and it competed with `spd dev` for the same
# port. One way to run dev, one way to run Playwright-without-spd.
#
# Prerequisites:
#   `supabase start` (or `spd db up`) before `docker compose --profile pw up` —
#   the supabase CLI manages the Supabase containers independently; this file
#   never touches them.
#
# ── Usage ────────────────────────────────────────────────────────────────────
#
#   docker compose --profile pw run playwright    # run Playwright scenes
#   docker compose --profile pw down              # tear down
#
# ─────────────────────────────────────────────────────────────────────────────

# ── Supabase connection from inside Docker ────────────────────────────────────
# The supabase CLI runs the local stack on the host at port 54321.
# Inside Docker containers, reach it via host.docker.internal (works on macOS
# Docker Desktop automatically; on Linux the x-host-gateway alias below handles it).
# The anon key is fixed and identical for every local Supabase instance — not a secret.
x-local-supabase: &local-supabase
  VITE_SUPABASE_URL:      "${VITE_SUPABASE_URL:-http://host.docker.internal:54321}"
  VITE_SUPABASE_ANON_KEY: "${VITE_SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7kyqd7B8LzSPCLMoW4raUmzqEsHV_oTxKpo}"

# Makes host.docker.internal resolve to the Docker host on Linux (no-op on macOS).
x-host-gateway: &host-gateway
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:

  # ── App, for Playwright to test against ──────────────────────────────────
  # NOT the dev workflow — see the file header. Only ever started as a
  # dependency of the playwright service below (profile: pw only, no
  # standalone "dev" profile). SPD_INSIDE_CONTAINER=1 so
  # scripts/require-container.ts's predev guard doesn't refuse to start it —
  # this genuinely is a container, just not the spd-managed one.
  app:
    build:
      context:    .
      dockerfile: Dockerfile
      target:     dev
    container_name: "${COMPOSE_PROJECT_NAME:-spd-project}-app"
    volumes:
      - .:/app
      - /app/node_modules   # prevents host node_modules from shadowing the container's
    ports:
      - "${APP_PORT:-5173}:5173"
    environment:
      <<: *local-supabase
      NODE_ENV: development
      SPD_INSIDE_CONTAINER: "1"
    <<: *host-gateway
    profiles: ["pw"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # ── Playwright scene runner ───────────────────────────────────────────────
  # Profile: pw — run with: docker compose --profile pw run playwright
  # Microsoft's image has all three browsers pre-installed.
  playwright:
    image: mcr.microsoft.com/playwright:v1.49.0-jammy
    container_name: "${COMPOSE_PROJECT_NAME:-spd-project}-playwright"
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      <<: *local-supabase
      BASE_URL: "http://app:5173"
      CI: "true"
    <<: *host-gateway
    depends_on:
      app:
        condition: service_healthy
    profiles: ["pw"]
    command:
      - npx
      - playwright
      - test
      - "--reporter=html,json"
