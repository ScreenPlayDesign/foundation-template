# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — SPD project dev stack
#
# Prerequisites:
#   Run `make setup` once before first use. This starts the local Supabase
#   stack via the supabase CLI (`supabase start`) and applies migrations.
#   The supabase CLI manages the Supabase containers independently — this file
#   only manages the app dev server and the Playwright runner.
#
# ── Three-database model ─────────────────────────────────────────────────────
#
#   local    →  Supabase stack managed by the supabase CLI (supabase start)
#   staging  →  <staging-ref>.supabase.co  (cloud; for dress-rehearsal reviews)
#   prod     →  <prod-ref>.supabase.co     (CI-only; never run locally)
#
# ── Profiles ─────────────────────────────────────────────────────────────────
#
#   (no profile)  →  nothing
#   --profile dev →  Vite HMR dev server
#   --profile pw  →  all of the above + Playwright runner
#
# ── Usage ────────────────────────────────────────────────────────────────────
#
#   make dev                                      # ensure supabase running + Vite HMR
#   docker compose --profile dev up               # just the Vite dev server
#   docker compose --profile pw run playwright    # run Playwright scenes
#   docker compose down                           # tear down (supabase managed by CLI)
#
# ─────────────────────────────────────────────────────────────────────────────

# ── Supabase connection from inside Docker ────────────────────────────────────
# The supabase CLI runs the local stack on the host at port 54321.
# Inside Docker containers, reach it via host.docker.internal (works on macOS
# Docker Desktop automatically; on Linux the x-host-gateway alias below handles it).
# The anon key is fixed and identical for every local Supabase instance — not a secret.
x-local-supabase: &local-supabase
  VITE_SUPABASE_URL:      "${VITE_SUPABASE_URL:-http://host.docker.internal:54321}"
  VITE_SUPABASE_ANON_KEY: "${VITE_SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7kyqd7B8LzSPCLMoW4raUmzqEsHV_oTxKpo}"

# Makes host.docker.internal resolve to the Docker host on Linux (no-op on macOS).
x-host-gateway: &host-gateway
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:

  # ── App dev server ────────────────────────────────────────────────────────
  # Vite HMR. Source is bind-mounted so edits on the host reflect instantly.
  app:
    build:
      context:    .
      dockerfile: Dockerfile
      target:     dev
    container_name: "${COMPOSE_PROJECT_NAME:-spd-project}-app"
    volumes:
      - .:/app
      - /app/node_modules   # prevents host node_modules from shadowing the container's
    ports:
      - "${APP_PORT:-5173}:5173"
    environment:
      <<: *local-supabase
      NODE_ENV: development
    <<: *host-gateway
    profiles: ["dev", "pw"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # ── Playwright scene runner ───────────────────────────────────────────────
  # Profile: pw — run with: docker compose --profile pw run playwright
  # Microsoft's image has all three browsers pre-installed.
  playwright:
    image: mcr.microsoft.com/playwright:v1.49.0-jammy
    container_name: "${COMPOSE_PROJECT_NAME:-spd-project}-playwright"
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      <<: *local-supabase
      BASE_URL: "http://app:5173"
      CI: "true"
    <<: *host-gateway
    depends_on:
      app:
        condition: service_healthy
    profiles: ["pw"]
    command:
      - npx
      - playwright
      - test
      - "--reporter=html,json"
